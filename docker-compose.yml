services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: otherworld
      POSTGRES_PASSWORD: otherworld
      POSTGRES_DB: fabric
    ports: ["127.0.0.1:5433:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U otherworld -d fabric"]
      interval: 2s
      timeout: 2s
      retries: 10
volumes:
  pgdata:
